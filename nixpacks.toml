# Nixpacks config for Railway deployments.
# This defines the default BUILD for all services (pnpm install + API compile).
# Each Railway service overrides the START command in the dashboard.
#
# Service start commands (set per-service in Railway dashboard):
#   api:                  node apps/api/dist/index.js
#   worker-outbound-call: pnpm --filter @qyro/queue worker:outbound-call
#   worker-outreach:      pnpm --filter @qyro/queue worker:outreach
#   worker-research:      pnpm --filter @qyro/queue worker:research
#   migrate-db:           npx tsx infra/migrate.ts

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["pnpm install"]

[phases.build]
cmds = ["pnpm turbo build --filter=@qyro/api"]

[start]
cmd = "node apps/api/dist/index.js"
